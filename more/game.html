<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEGO 小游戏示例</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 24px;
        }
        .config-panel {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #e9ecef;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #495057;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #4c6ef5;
            box-shadow: 0 0 0 3px rgba(76, 110, 245, 0.1);
        }
        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        button.primary {
            background: #4c6ef5;
            color: white;
        }
        button.primary:hover {
            background: #3b5bdb;
        }
        button.secondary {
            background: #e9ecef;
            color: #495057;
        }
        button.secondary:hover {
            background: #dee2e6;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .game-list {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #e9ecef;
            max-height: 300px;
            overflow-y: auto;
        }
        .game-item {
            padding: 12px;
            border-bottom: 1px solid #e9ecef;
            cursor: pointer;
            transition: background 0.2s;
        }
        .game-item:hover {
            background: #e9ecef;
        }
        .game-item.selected {
            background: #d0ebff;
            border-left: 4px solid #4c6ef5;
        }
        .game-item:last-child {
            border-bottom: none;
        }
        .game-title {
            font-weight: 500;
            color: #212529;
        }
        .game-id {
            font-size: 12px;
            color: #6c757d;
            margin-top: 4px;
        }
        #gameContainer {
            width: 100%;
            height: 500px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            overflow: hidden;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c757d;
        }
        #gameContainer iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .log-panel {
            margin-top: 24px;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            border: 1px solid #e9ecef;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #e9ecef;
            color: #495057;
        }
        .log-entry.error {
            color: #fa5252;
        }
        .log-entry.success {
            color: #40c057;
        }
        .note {
            background: #fff3bf;
            border: 1px solid #ffe066;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 20px;
            color: #e67700;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 ZEGO 小游戏示例</h1>
        
        <!-- 注意事项提示 -->
        <div class="note">
            <strong>⚠️ 使用前必读：</strong><br>
            1. 需要先在 ZEGO 控制台创建项目并获取 AppID[citation:3][citation:6]<br>
            2. 需要联系 ZEGO 商务开通小游戏服务[citation:3][citation:8]<br>
            3. Token 需要从你的服务端获取，或使用控制台的临时 Token[citation:3][citation:8]<br>
            4. 用户ID需要与生成 Token 时使用的 ID 保持一致[citation:3]
        </div>

        <!-- 配置面板 -->
        <div class="config-panel">
            <div class="form-group">
                <label for="appId">AppID</label>
                <input type="text" id="appId" placeholder="请输入你的 AppID" value="">
            </div>
            <div class="form-group">
                <label for="token">Token</label>
                <input type="text" id="token" placeholder="请输入你的 Token" value="">
            </div>
            <div class="form-group">
                <label for="userId">用户ID</label>
                <input type="text" id="userId" placeholder="自定义用户ID" value="user_123">
            </div>
            <div class="form-group">
                <label for="userName">用户名</label>
                <input type="text" id="userName" placeholder="自定义用户名" value="玩家">
            </div>
        </div>

        <!-- 操作按钮组 -->
        <div class="button-group">
            <button class="primary" onclick="initSDK()">1. 初始化 SDK</button>
            <button class="secondary" onclick="getGameList()" id="getListBtn" disabled>2. 获取游戏列表</button>
            <button class="secondary" onclick="loadSelectedGame()" id="loadGameBtn" disabled>3. 加载选中游戏</button>
            <button class="secondary" onclick="unloadGame()" id="unloadBtn" disabled>4. 卸载游戏</button>
        </div>

        <!-- 游戏列表展示区 -->
        <div class="game-list" id="gameList">
            <div style="color: #6c757d; text-align: center; padding: 20px;">
                点击"获取游戏列表"加载游戏
            </div>
        </div>

        <!-- 游戏容器 - 关键：需要 iframe 作为游戏展示区[citation:4] -->
        <div id="gameContainer">
            <iframe id="gameIframe" style="display: none;"></iframe>
            <div id="gamePlaceholder">游戏将在这里显示</div>
        </div>

        <!-- 日志面板 -->
        <div class="log-panel" id="logPanel">
            <div class="log-entry">系统就绪，等待操作...</div>
        </div>
    </div>

    <!-- 引入 ZEGO SDK[citation:4] -->
    <script src="https://unpkg.com/zego-mini-game-engine@latest/dist/index.min.js"></script>
    
    <script>
        // 全局变量
        let zegoInstance = null;
        let gameList = [];
        let selectedGameId = null;

        // 日志记录函数
        function addLog(message, type = 'info') {
            const logPanel = document.getElementById('logPanel');
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry ' + (type === 'error' ? 'error' : (type === 'success' ? 'success' : ''));
            logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logPanel.appendChild(logEntry);
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        // 初始化 SDK
        async function initSDK() {
            const appId = document.getElementById('appId').value.trim();
            const token = document.getElementById('token').value.trim();
            const userId = document.getElementById('userId').value.trim();
            const userName = document.getElementById('userName').value.trim();

            if (!appId || !token || !userId || !userName) {
                addLog('请填写所有必填字段', 'error');
                return;
            }

            addLog('正在初始化 SDK...');
            
            try {
                // 构建用户信息[citation:3]
                const userInfo = {
                    userId: userId,
                    userName: userName,
                    avatar: '' // 可选，头像URL
                };

                // 调用初始化接口[citation:3][citation:10]
                await ZegoMiniGameEngine.init(Number(appId), token, userInfo)
                    .then((result) => {
                        zegoInstance = result;
                        addLog('SDK 初始化成功！', 'success');
                        
                        // 启用下一步按钮
                        document.getElementById('getListBtn').disabled = false;
                        
                        // 设置游戏容器 - 注意 ID 前需要加 '#'[citation:8]
                        if (zegoInstance) {
                            zegoInstance.setGameContainer('#gameIframe');
                            addLog('游戏容器设置完成');
                            
                            // 注册事件监听[citation:3][citation:10]
                            registerEventListeners();
                        }
                    })
                    .catch((error) => {
                        addLog(`初始化失败: ${error.message || '未知错误'}`, 'error');
                        console.error('Init error:', error);
                    });

            } catch (error) {
                addLog(`初始化异常: ${error.message}`, 'error');
            }
        }

        // 注册事件监听器[citation:3][citation:8]
        function registerEventListeners() {
            if (!zegoInstance) return;

            // 游戏结算事件
            zegoInstance.on('gameResult', (data) => {
                addLog(`游戏结算: ${JSON.stringify(data)}`);
            });

            // 游戏加载状态更新[citation:3]
            zegoInstance.on('gameLoadStateUpdate', async (data) => {
                addLog(`游戏加载状态: ${JSON.stringify(data)}`);
                
                // 游戏加载完成后启用加载游戏按钮
                if (data && data.gameLoadState === 'ZegoGameLoaded') {
                    document.getElementById('loadGameBtn').disabled = false;
                }
            });

            // 游戏状态更新[citation:10]
            zegoInstance.on('gameStateUpdate', (data) => {
                addLog(`游戏状态变化: ${JSON.stringify(data)}`);
            });

            // Token 即将过期[citation:3]
            zegoInstance.on('tokenWillExpire', async (data) => {
                addLog('Token 即将过期，请及时更新', 'error');
            });

            // 游戏错误事件[citation:3]
            zegoInstance.on('gameError', (data) => {
                addLog(`游戏错误: ${JSON.stringify(data)}`, 'error');
            });

            // 玩家状态更新[citation:3]
            zegoInstance.on('playerStateUpdate', (data) => {
                addLog(`玩家状态: ${JSON.stringify(data)}`);
            });

            // 游戏卸载成功[citation:3]
            zegoInstance.on('unloaded', (data) => {
                addLog('游戏已卸载', 'success');
                document.getElementById('unloadBtn').disabled = true;
                
                // 显示占位符
                document.getElementById('gameIframe').style.display = 'none';
                document.getElementById('gamePlaceholder').style.display = 'flex';
            });
        }

        // 获取游戏列表
        async function getGameList() {
            if (!zegoInstance) {
                addLog('请先初始化 SDK', 'error');
                return;
            }

            addLog('正在获取游戏列表...');
            
            try {
                // 调用 getAllGameList 获取所有游戏[citation:1][citation:3]
                const result = await zegoInstance.getAllGameList();
                gameList = result.gameInfoList || [];
                
                // 渲染游戏列表
                renderGameList(gameList);
                
                addLog(`获取到 ${gameList.length} 个游戏`, 'success');
                
                if (gameList.length > 0) {
                    document.getElementById('loadGameBtn').disabled = false;
                }
            } catch (error) {
                addLog(`获取游戏列表失败: ${error.message}`, 'error');
            }
        }

        // 渲染游戏列表
        function renderGameList(games) {
            const gameListEl = document.getElementById('gameList');
            
            if (!games || games.length === 0) {
                gameListEl.innerHTML = '<div style="color: #6c757d; text-align: center; padding: 20px;">暂无游戏</div>';
                return;
            }

            let html = '';
            games.forEach(game => {
                html += `
                    <div class="game-item ${selectedGameId === game.gameId ? 'selected' : ''}" 
                         onclick="selectGame('${game.gameId}')">
                        <div class="game-title">${game.gameName || '未知游戏'}</div>
                        <div class="game-id">游戏ID: ${game.gameId}</div>
                    </div>
                `;
            });
            
            gameListEl.innerHTML = html;
        }

        // 选择游戏
        window.selectGame = function(gameId) {
            selectedGameId = gameId;
            renderGameList(gameList);
            addLog(`已选择游戏: ${gameId}`);
        };

        // 加载选中的游戏
        async function loadSelectedGame() {
            if (!zegoInstance) {
                addLog('请先初始化 SDK', 'error');
                return;
            }

            if (!selectedGameId) {
                addLog('请先选择一个游戏', 'error');
                return;
            }

            addLog(`正在加载游戏: ${selectedGameId}...`);
            
            try {
                // 显示 iframe，隐藏占位符
                document.getElementById('gameIframe').style.display = 'block';
                document.getElementById('gamePlaceholder').style.display = 'none';
                
                // 加载游戏 - 使用游戏场半屏模式[citation:8]
                const gameMode = 2; // 2 代表游戏场半屏模式
                const roomId = 'room_' + Date.now(); // 生成随机房间ID
                
                await zegoInstance.loadGame(selectedGameId, gameMode, {
                    roomId: roomId,
                    customPlaySound: false
                });
                
                addLog(`游戏加载请求已发送，等待加载完成...`, 'success');
                
            } catch (error) {
                addLog(`加载游戏失败: ${error.message}`, 'error');
            }
        }

        // 卸载游戏
        async function unloadGame() {
            if (!zegoInstance) {
                addLog('请先初始化 SDK', 'error');
                return;
            }

            addLog('正在卸载游戏...');
            
            try {
                // 调用 unloadGame，false 表示需要玩家确认[citation:10]
                await zegoInstance.unloadGame(false);
                addLog('游戏卸载成功', 'success');
            } catch (error) {
                addLog(`卸载游戏失败: ${error.message}`, 'error');
            }
        }

        // 页面卸载前释放资源[citation:1]
        window.addEventListener('beforeunload', () => {
            if (zegoInstance) {
                zegoInstance.unInit();
            }
        });

    </script>
</body>
</html>
