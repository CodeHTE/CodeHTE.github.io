            // 合并两个课表
            function mergeTwoSchedules(scheduleId1, scheduleId2) {
                const schedule1 = schedules[scheduleId1];
                const schedule2 = schedules[scheduleId2];
                
                if (!schedule1 || !schedule2) {
                    alert('课表数据不完整，无法合并');
                    return;
                }
                
                // 保存当前课表（如果在编辑模式下）
                if (editingMode) {
                    saveCurrentSchedule();
                }
                
                // 退出编辑模式
                if (editingMode) {
                    editingMode = false;
                    document.body.classList.remove('editing');
                    document.querySelectorAll('.course-cell').forEach(c => c.classList.remove('editable', 'selected', 'merge-hover', 'copy-hover'));
                    renderFooter();
                }
                
                // 创建合并后的课表数据
                const mergedData = [];
                
                // 获取两个课表的数据长度（应该相同）
                const dataLength = Math.max(
                    schedule1.data ? schedule1.data.length : 0,
                    schedule2.data ? schedule2.data.length : 0
                );
                
                // 合并数据
                for (let i = 0; i < dataLength; i++) {
                    const course1 = schedule1.data && schedule1.data[i] ? schedule1.data[i] : {
                        name: '',
                        location: '',
                        teacher: '',
                        type: 'none'
                    };
                    
                    const course2 = schedule2.data && schedule2.data[i] ? schedule2.data[i] : {
                        name: '',
                        location: '',
                        teacher: '',
                        type: 'none'
                    };
                    
                    mergedData.push({
                        course1: course1,
                        course2: course2
                    });
                }
                
                // 生成合并课表名称
                const mergeCount = Object.keys(schedules).filter(id => id.startsWith('merge_')).length + 1;
                const mergedScheduleId = 'merge_' + Date.now();
                const mergedScheduleTitle = `合并课表${mergeCount}`;
                
                // 保存合并后的课表数据
                schedules[mergedScheduleId] = {
                    title: mergedScheduleTitle,
                    data: mergedData,
                    isMerged: true // 标记为合并课表
                };
                
                // 更新课表选择器
                updateScheduleSelector();
                
                // 切换到合并后的课表
                switchSchedule(mergedScheduleId);
                
                // 隐藏合并课表模态框
                const modal = document.getElementById('mergeScheduleModal');
                if (modal) {
                    document.body.removeChild(modal);
                }
                const overlay = document.getElementById('modalOverlay');
                if (overlay) {
                    overlay.style.display = 'none';
                    overlay.classList.remove('show');
                    document.body.style.overflow = '';
                }
            }

            });

            // 导出PDF功能
            const exportPdfBtn = document.getElementById('exportPdfBtn');
            if (exportPdfBtn) {
                exportPdfBtn.addEventListener('click', function() {
                    const originalText = exportPdfBtn.textContent;
                    exportPdfBtn.textContent = '正在导出...';
                    exportPdfBtn.disabled = true;

                    // 获取当前课表名称
                    const titleText = document.getElementById('currentScheduleTitle').textContent || '课程表';

                    // 添加导出专用样式
                    let styleEl = document.getElementById('pdf-export-style');
                    if (!styleEl) {
                        styleEl = document.createElement('style');
                        styleEl.id = 'pdf-export-style';
                        document.head.appendChild(styleEl);
                    }
                    // 使用 CSS 隐藏不需要的元素，并强制固定课表宽度避免被截断
                    styleEl.innerHTML = `
                        body.exporting-pdf .nav,
                        body.exporting-pdf .title-with-images,
                        body.exporting-pdf .back-btn,
                        body.exporting-pdf .instruction-text,
                        body.exporting-pdf #scheduleManager,
                        body.exporting-pdf .theme-switcher,
                        body.exporting-pdf .table-footer,
                        body.exporting-pdf img,
                        body.exporting-pdf #returnToScheduleBtn {
                            display: none !important;
                        }
                        body.exporting-pdf .container {
                            max-width: none !important;
                            width: max-content !important;
                            margin: 0 !important;
                            padding: 0 !important; /* 去除原本的 20px padding，避免被 html2canvas 捕获导致双重边距和尺寸溢出 */
                            box-shadow: none !important;
                            overflow: visible !important;
                        }
                        body.exporting-pdf .table-wrapper {
                            overflow: visible !important;
                            overflow-x: visible !important;
                        }
                        body.exporting-pdf p.edit-tips {
                            display: none !important;
                        }
                    `;

                    // 给提示文字加上一个 class 以便隐藏
                    Array.from(document.querySelectorAll('div, p')).forEach(el => {
                        if (el.textContent && (el.textContent.includes('点击"编辑"按钮进入编辑模式') || el.textContent.includes('双击单元格添加课程'))) {
                            el.classList.add('edit-tips');
                        }
                    });

                    // 开启导出模式
                    document.body.classList.add('exporting-pdf');
                    const container = document.querySelector('.container');
                    
                    // 保证背景色填充正确
                    let bgColor = window.getComputedStyle(document.body).backgroundColor;
                    if (bgColor === 'rgba(0, 0, 0, 0)' || bgColor === 'transparent') {
                        bgColor = '#ffffff';
                    }

                    // 临时滚动到顶部，防止 html2canvas 视口偏移导致大面积空白
                    window.scrollTo(0, 0);

                    // 延迟 300ms 等待浏览器重新排版
                    setTimeout(() => {
                        // 强制将 wrapper 宽度固定，防止在渲染瞬间尺寸坍缩导致内容为空
                        const tableWrapper = document.querySelector('.table-wrapper');
                        const courseTable = document.getElementById('courseTable');
                        
                        // 记录原始内联样式
                        const origWrapperWidth = tableWrapper.style.width;
                        const origTableWidth = courseTable.style.width;
                        const origContainerWidth = container.style.width;
                        
                        // 强制表格宽度，确保在 PDF 画布上能完整展开
                        courseTable.style.width = '1390px';
                        tableWrapper.style.width = '1390px';
                        container.style.width = '1390px'; 
                        
                        // 让浏览器应用样式
                        setTimeout(() => {
                            // 计算容器实际宽高
                            const containerRect = container.getBoundingClientRect();
                            
                            // jsPDF 的 format 定义纸张大小。
                            // 实际需要的纸张大小 = 容器内容实际大小 + html2pdf 配置的上下左右各 10px margin (即宽和高各加 20) + 些许防溢出缓冲 (比如2px)
                            const paperWidth = containerRect.width + 22; 
                            const paperHeight = containerRect.height + 22; 
                            
                            const opt = {
                                margin:       10, // 上下左右 10px
                                filename:     titleText + '.pdf',
                                image:        { type: 'jpeg', quality: 1},
                                html2canvas:  { 
                                    scale: 4, 
                                    useCORS: true, 
                                    allowTaint: false,
                                    backgroundColor: bgColor,
                                    windowWidth: containerRect.width + 20, // 稍微加大窗口宽度缓冲，防止 html2canvas 内部裁剪
                                    scrollY: 0,
                                    scrollX: 0,
                                    x:10
                                },
                                // 动态设置PDF页面尺寸 [宽, 高]
                                jsPDF:        { unit: 'px', format: [paperWidth, paperHeight], orientation: 'landscape', hotfixes: ["px_scaling"] }
                            };

                            html2pdf().set(opt).from(container).save().then(function() {
                                // 恢复界面与内联样式
                                document.body.classList.remove('exporting-pdf');
                                courseTable.style.width = origTableWidth;
                                tableWrapper.style.width = origWrapperWidth;
                                container.style.width = origContainerWidth;
                                
                                exportPdfBtn.textContent = originalText;
                                exportPdfBtn.disabled = false;
                            }).catch(function(err) {
                                console.error('PDF导出失败:', err);
                                alert('导出PDF失败，请重试。' + err.message);
                                // 恢复界面与内联样式
                                document.body.classList.remove('exporting-pdf');
                                courseTable.style.width = origTableWidth;
                                tableWrapper.style.width = origWrapperWidth;
                                container.style.width = origContainerWidth;
                                
                                exportPdfBtn.textContent = originalText;
                                exportPdfBtn.disabled = false;
                            });
                        }, 50);
                    }, 300); 
                });
            }

            // ========== 初始化课程表 ==========
            initMetadata();
            initScheduleManager(); // 初始化多课表管理器
            renderFooter();
            initEventListeners();
            initNotesPanel();
            window.addEventListener('resize', syncNotesHeight);
        })();
    </script>
</body>
</html>
